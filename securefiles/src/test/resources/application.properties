spring.datasource.url=jdbc:postgresql://localhost:5434/securefiles
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.admin.password=${ADMIN_PASSWORD}
app.user.password=${USER_PASSWORD}
app.cors.origin=${CORS_ORIGIN:http://localhost:5173}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.master.key=test-master-key-for-testing-only-32c

app.storage.endpoint=http://localhost:9000
app.storage.access-key=minioadmin
app.storage.secret-key=minioadmin
app.storage.bucket=securefiles
