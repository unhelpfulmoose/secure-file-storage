spring.datasource.url=jdbc:postgresql://localhost:5434/securefiles
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.admin.password=${ADMIN_PASSWORD}
app.user.password=${USER_PASSWORD}
app.cors.origin=${CORS_ORIGIN}
app.master.key=${MASTER_ENCRYPTION_KEY}

app.storage.endpoint=${MINIO_ENDPOINT}
app.storage.access-key=${MINIO_ACCESS_KEY}
app.storage.secret-key=${MINIO_SECRET_KEY}
app.storage.bucket=${MINIO_BUCKET}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}